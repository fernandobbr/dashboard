<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Usinagem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    if (sessionStorage.getItem('dash_auth') !== '1') window.location.replace('login.html');
    document.documentElement.setAttribute('data-theme', sessionStorage.getItem('dash_theme') || 'dark');
  </script>
  <style>
    :root {
      --bg: #070a10;
      --s1: #0d1117;
      --s2: #121826;
      --border: #1a2332;
      --cyan: #00d4ff;
      --yellow: #f5c842;
      --green: #00D4A2;
      --red: #ff4d6d;
      --orange: #ff7a35;
      --muted: #4a5a7a;
      --text: #e2e8f0;
      --text2: #8a9bbf;
      --frame-border: rgba(0, 212, 255, 0.18);
      --icon-filter: brightness(0) invert(1) opacity(0.6);
      --icon-filter-hover: brightness(0) invert(1) opacity(1);
    }

    [data-theme="light"] {
      --bg: #f0f2f5;
      --s1: #ffffff;
      --s2: #e8ecf2;
      --border: #c8d0de;
      --cyan: #0077cc;
      --yellow: #c47d00;
      --green: #007a5e;
      --red: #c0243e;
      --orange: #c45200;
      --muted: #1a2030;
      --text: #0a0f18;
      --text2: #1a2030;
      --frame-border: rgba(0, 100, 200, 0.22);
      --icon-filter: brightness(0) opacity(0.5);
      --icon-filter-hover: brightness(0) opacity(0.85);
    }

    [data-theme="light"] .upload-box,
    [data-theme="light"] .panel-frame {
      box-shadow: 0 0 0 1px rgba(0, 100, 200, 0.06),
        0 2px 20px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(18, 24, 38, .5);
      border-left: 1px solid var(--border);
      border-radius: 4px;
    }

    *::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, .2);
      border-radius: 4px;
      border: 1px solid rgba(0, 212, 255, .1);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, .5);
    }

    *::-webkit-scrollbar-thumb:active {
      background: rgba(0, 212, 255, .8);
    }

    [data-theme="light"] *::-webkit-scrollbar-track {
      background: rgba(200, 208, 222, .4);
    }

    [data-theme="light"] *::-webkit-scrollbar-thumb {
      background: rgba(0, 100, 200, .2);
      border-color: rgba(0, 100, 200, .1);
    }

    [data-theme="light"] *::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 100, 200, .4);
    }

    [data-theme="light"] *::-webkit-scrollbar-thumb:active {
      background: rgba(0, 100, 200, .7);
    }

    body {
      background: var(--bg);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 212, 255, .4) var(--bg);
    }

    /* ── PAINEL KANBAN ── */
    #kanban-panel {
      display: block;
      width: 100%;
      max-width: 900px;
    }

    .panel-frame {
      position: relative;
      border: 1px solid var(--frame-border);
      border-radius: 2px;
      background: linear-gradient(135deg, var(--s1) 0%, var(--s2) 100%);
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.05),
        0 0 40px rgba(0, 212, 255, 0.04),
        inset 0 1px 0 rgba(0, 212, 255, 0.08),
        0 4px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .panel-frame::before,
    .panel-frame::after,
    .panel-frame .corner-tr,
    .panel-frame .corner-bl {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--cyan);
      border-style: solid;
      z-index: 2;
    }

    .panel-frame::before {
      top: -1px;
      left: -1px;
      border-width: 2px 0 0 2px;
    }

    .panel-frame::after {
      bottom: -1px;
      right: -1px;
      border-width: 0 2px 2px 0;
    }

    .panel-frame .corner-tr {
      top: -1px;
      right: -1px;
      border-width: 2px 2px 0 0;
    }

    .panel-frame .corner-bl {
      bottom: -1px;
      left: -1px;
      border-width: 0 0 2px 2px;
    }

    /* ── HEADER ── */
    .panel-header {
      border-top: 2px solid var(--cyan);
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .panel-icon {
      width: 18px;
      height: 18px;
      filter: var(--icon-filter);
      transition: filter 0.2s ease;
      flex-shrink: 0;
    }

    .panel-icon:hover {
      filter: var(--icon-filter-hover);
    }

    .panel-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }

    .panel-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .header-legend {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .header-legend .legend-item {
      color: var(--text);
    }

    [data-theme="light"] .header-legend .legend-item {
      color: var(--text);
    }


    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* botão trocar arquivo no header */
    .btn-trocar {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-trocar:hover {
      border-color: var(--text2);
      color: var(--text2);
    }

    /* ── BODY ── */
    .panel-body {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── CABEÇALHO DE COLUNAS ── */
    .bar-header {
      display: grid;
      grid-template-columns: 180px 1fr 64px 72px 36px 36px;
      align-items: center;
      gap: 12px;
      padding: 0 0 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .bar-header-col {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .bar-header-col.center { text-align: center; }
    .bar-header-col.right  { text-align: right; }

    /* ── BAR ROW ── */
    .bar-row {
      display: grid;
      grid-template-columns: 180px 1fr 64px 72px 36px 36px;
      align-items: center;
      gap: 12px;
      padding: 5px 0;
    }

    .bar-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    .bar-code-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .bar-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text2);
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-desc {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── COLUNA SALDO ── */
    .bar-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    /* ── COLUNA QTD OP ── */
    .bar-ops-col {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bar-ops-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--cyan);
    }
    .bar-ops-empty {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    /* ── COLUNA LINKS ── */
    .bar-links-col {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .bar-link {
      display: inline-flex;
      align-items: center;
      color: #ffffff;
      transition: color 0.15s;
      flex-shrink: 0;
      text-decoration: none;
    }
    .bar-link:hover { color: var(--cyan); }
    [data-theme="light"] .bar-link { color: #000000; }
    [data-theme="light"] .bar-link:hover { color: var(--cyan); }
    .bar-link-ops {
      display: inline-flex;
      align-items: center;
      color: #ffffff;
      transition: color 0.15s;
      text-decoration: none;
      flex-shrink: 0;
    }
    .bar-link-ops:hover { color: var(--cyan); }
    [data-theme="light"] .bar-link-ops { color: #000000; }
    [data-theme="light"] .bar-link-ops:hover { color: var(--cyan); }

    /* ── TRACK ── */
    .track-wrap {
      position: relative;
      height: 28px;
      cursor: pointer;
    }

    .track-bg {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 12px;
      transform: translateY(-50%);
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .track-fill {
      height: 100%;
      border-radius: 1px;
      width: 0;
      transition: width 2.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .track-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      pointer-events: none;
    }

    .track-marker.min {
      background: var(--yellow);
      opacity: 1;
    }

    .track-marker.lim {
      background: var(--red);
      opacity: 1;
    }

    /* ── OPS BADGE NA BARRA ── */
    .bar-ops {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      font-weight: 600;
      color: var(--cyan);
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 2px;
      padding: 1px 5px;
      white-space: nowrap;
      margin-top: 2px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .bar-ops:hover {
      background: rgba(0,212,255,0.16);
      border-color: rgba(0,212,255,0.5);
    }
    [data-theme="light"] .bar-ops {
      color: var(--cyan);
      background: rgba(0,119,204,0.08);
      border-color: rgba(0,119,204,0.25);
    }
    [data-theme="light"] .bar-ops:hover {
      background: rgba(0,119,204,0.15);
      border-color: rgba(0,119,204,0.5);
    }

    /* ── VALUE ── */
    .bar-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }

    .bar-divider {
      height: 1px;
      background: var(--border);
      opacity: 0.5;
      margin: 2px 0;
    }

    /* ── PAINEL DE NOTIFICAÇÕES ── */
    #notif-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 0;
      z-index: 8000;
    }

    #notif-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 2px 2px 0 0;
      border-top: 2px solid var(--cyan);
    }

    #notif-header-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #notif-count {
      background: var(--cyan);
      color: #050810;
      font-size: 8px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 1px;
      min-width: 16px;
      text-align: center;
    }

    .notif-close-all {
      background: none;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.5px;
      cursor: pointer;
      padding: 3px 7px;
      transition: all 0.15s;
    }

    .notif-close-all:hover {
      border-color: var(--text2);
      color: var(--text);
    }

    #notif-list {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 2px 2px;
      scrollbar-width: thin;
    }

    .notif-card {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 12px;
      border-left: 3px solid;
      border-bottom: 1px solid var(--border);
      animation: slideIn .25s cubic-bezier(.16, 1, .3, 1) both;
      transition: opacity .2s, transform .2s;
    }

    .notif-card:last-child {
      border-bottom: none;
    }

    .notif-card.baixo {
      border-left-color: var(--yellow);
      background: rgba(245, 200, 66, 0.06);
    }

    .notif-card.excedido {
      border-left-color: var(--red);
      background: rgba(255, 77, 109, 0.06);
    }

    [data-theme="light"] .notif-card.baixo {
      background: rgba(245, 200, 66, 0.10);
    }

    [data-theme="light"] .notif-card.excedido {
      background: rgba(255, 77, 109, 0.10);
    }

    .notif-card.saindo {
      opacity: 0;
      transform: translateX(20px);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(24px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .notif-top {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .notif-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    .notif-card.baixo .notif-badge {
      background: rgba(245, 200, 66, 0.12);
      color: var(--yellow);
      border: 1px solid rgba(245, 200, 66, 0.4);
    }

    .notif-card.excedido .notif-badge {
      background: rgba(255, 77, 109, 0.12);
      color: var(--red);
      border: 1px solid rgba(255, 77, 109, 0.4);
    }

    .notif-cod {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text2);
      flex: 1;
    }

    .notif-link {
      display: inline-flex;
      align-items: center;
      color: #ffffff;
      text-decoration: none;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .notif-link:hover { color: var(--cyan); }
    [data-theme="light"] .notif-link { color: #000000; }
    [data-theme="light"] .notif-link:hover { color: var(--cyan); }

    .notif-x {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .notif-x:hover {
      color: var(--text);
    }

    .notif-desc {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notif-detail {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text2);
    }

    .notif-card.baixo .notif-detail strong {
      color: var(--yellow);
      font-weight: 700;
    }

    .notif-card.excedido .notif-detail strong {
      color: var(--red);
      font-weight: 700;
    }

    /* ── FOOTER ── */
    .panel-footer {
      background: var(--s1);
      border-top: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .footer-counter {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .footer-counter .count-val {
      font-size: 13px;
      font-weight: 700;
    }

    /* ── TOOLTIP ── */
    .tooltip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      min-width: 200px;
      max-width: 280px;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip-inner {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 10px 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
    }

    .tt-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .tt-status-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 1px;
    }

    .tt-code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text2);
    }

    .tt-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .tt-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 3px 12px;
      margin-bottom: 6px;
    }

    .tt-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .tt-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
    }

    .tt-ops {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .tt-ops-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tt-ops-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
    }
    .tt-ops-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--cyan);
    }
    .tt-ops-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      font-weight: 600;
      color: var(--cyan);
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 2px;
      padding: 3px 7px;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
      align-self: center;
    }
    .tt-ops-link:hover { background: rgba(0,212,255,0.18); }

    .tt-note {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <!-- KANBAN PANEL -->
  <div id="kanban-panel">
    <div class="panel-frame">
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>

      <div class="panel-header">
        <div class="header-left">
          <img src="assets/img/maquina-de-torno.png" class="panel-icon" alt="">
          <div>

  <!-- PAINEL DE NOTIFICAÇÕES -->
  <div id="notif-panel" style="display:none">
    <div id="notif-header">
      <div id="notif-header-title">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 01-3.46 0" />
        </svg>
        Alertas
        <span id="notif-count">0</span>
      </div>
      <button class="notif-close-all" onclick="fecharTodas()">fechar todas</button>
    </div>
    <div id="notif-list"></div>
  </div>

  <!-- TOOLTIP -->
  <div class="tooltip" id="tooltip">
    <div class="tooltip-inner">
      <div class="tt-header">
        <span class="tt-status-badge" id="tt-badge"></span>
        <span class="tt-code" id="tt-code"></span>
      </div>
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-grid">
        <span class="tt-label">Atual</span> <span class="tt-value" id="tt-atual"></span>
        <span class="tt-label">Mínimo</span> <span class="tt-value" id="tt-min"></span>
        <span class="tt-label">Normal</span> <span class="tt-value" id="tt-normal" style="color:var(--green)"></span>
        <span class="tt-label">Limite</span> <span class="tt-value" id="tt-limite"></span>
      </div>
      <div class="tt-ops" id="tt-ops" style="display:none">
        <div class="tt-ops-info">
          <span class="tt-ops-label">OPs em aberto</span>
          <span class="tt-ops-val" id="tt-ops-val"></span>
        </div>
        <a class="tt-ops-link" id="tt-ops-link" href="#" target="_blank">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
          </svg>
          Ver OPs
        </a>
      </div>
      <div class="tt-note" id="tt-note" style="display:none"></div>
    </div>
  </div>

  <script>
    // ── CONFIG POR ITEM ──────────────────────────────────────────────
    const itemConfig = [
      { cod: "704216", minimo: 25, limite: 62 }, // BUCHA DF50.5 X 4.76
      { cod: "191289", minimo: 25, limite: 100 }, // EIXO DINAL D55 X D43 X 22 255 RV
      { cod: "098386", minimo: 25, limite: 100 }, // PINO D25 X D30 X 45
      { cod: "081722", minimo: 25, limite: 100 }, // EIXO TROLE D20 X D18 X 130
      { cod: "143396", minimo: 25, limite: 100 }, // BUCHA DF35.5 X 4.76
      { cod: "005225", minimo: 25, limite: 100 }, // BUCHA D80 X 75 DF47
      { cod: "154060", minimo: 25, limite: 100 }, // EIXO D30 X D25.5 X D20 X 65
      { cod: "072403", minimo: 25, limite: 100 }, // EIXO ROLETE GUIA D19.05 X 260 TC260
      { cod: "128013", minimo: 25, limite: 100 }, // BUCHA M16 DIR GARFO M16 DIR ROT EQ
      { cod: "128015", minimo: 25, limite: 100 }, // BUCHA M16 ESQ GARFO M16 ESQ ROT EQ
      { cod: "094646", minimo: 25, limite: 100 }, // EIXO D19.5 X 915 ROL LIMP ROT EQ
      { cod: "152269", minimo: 25, limite: 100 }, // BUCHA 75 X D100 X DF60
      { cod: "036768", minimo: 25, limite: 100 }, // BUCHA D75 X 60
      { cod: "029413", minimo: 25, limite: 100 }, // EIXO RODA TRIPPER CT
      { cod: "080807", minimo: 25, limite: 100 }, // BUCHA SUP SUPTE HELD D60 X DF43
      { cod: "127527", minimo: 25, limite: 100 }, // EIXO D25.00 X D20 X 205 ROLAMENTO 20 EQ
      { cod: "063327", minimo: 25, limite: 100 }, // BUCHA D31.75 X DF25.5 X 40
      { cod: "080806", minimo: 25, limite: 100 }, // BUCHA INF SUPTE HELD D60 X DF43 X DF10
      { cod: "081723", minimo: 25, limite: 100 }, // EIXO ROL TROLE D25 X D17 X 30
      { cod: "093130", minimo: 25, limite: 100 }, // ESTIC 970 FIN ARO ROT MLR
      { cod: "095457", minimo: 25, limite: 100 }, // EIXO EMENDA D55 X D43 X 370 RV
      { cod: "140455", minimo: 25, limite: 100 }, // EIXO D25.00 X D20 X 290 WA20 EQ
      { cod: "140908", minimo: 25, limite: 100 }, // BUCHA D35 X 30 F20 ACION BIF Q320 EQ
      { cod: "120843", minimo: 25, limite: 100 }, // FIX D40 X 50 EIXO ACION MANUAL EC 51600
      { cod: "156542", minimo: 25, limite: 100 }, // SUPTE SENSOR EMBUCHAMENTO D90 X 40
      { cod: "080900", minimo: 25, limite: 100 }, // PINO D75 X 170 RV
      { cod: "606627", minimo: 25, limite: 100 }, // ROLETE GUIA ACO TC D90 X D70 X 69 X DF51
      { cod: "060044", minimo: 25, limite: 100 }, // BUCHA D25 X D16.5 X 30
    ];

    const DEFAULT_CFG = { minimo: 10, limite: 50 };

    function getCfg(cod) {
      const raw = itemConfig.find(i => String(i.cod).trim() === String(cod).trim()) || DEFAULT_CFG;
      return { ...raw };
    }

    function getStatus(atual, cfg) {
      if (atual < cfg.minimo) return { label: 'BAIXO', color: 'var(--yellow)' };
      if (atual > cfg.limite) return { label: 'EXCEDIDO', color: 'var(--red)' };
      return { label: 'NORMAL', color: 'var(--green)' };
    }

    function normKey(k) {
      return String(k).trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function trocarArquivo() {
      window.location.href = 'upload.html';
    }

    // ── PROCESSAR XLSX ───────────────────────────────────────────────
    function processarXlsx(binaryStr) {
      const wb = XLSX.read(binaryStr, { type: 'binary' });

      console.log('[Kanban Usinagem] Abas disponíveis:', wb.SheetNames.join(', '));

      const found = wb.SheetNames.find(n => n.trim().toLowerCase() === 'estoque');

      if (!found) {
        document.getElementById('bar-list').innerHTML = `
          <div style="padding:32px 0;text-align:center;">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--yellow);margin-bottom:10px;">ABA NÃO ENCONTRADA</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);line-height:1.8;">
              O arquivo carregado não contém a aba <span style="color:var(--cyan)">"Estoque"</span>.<br>
              Abas disponíveis: <span style="color:var(--text)">${wb.SheetNames.join(', ')}</span>
            </div>
          </div>`;
        document.getElementById('panel-subtitle').textContent = 'ABA "ESTOQUE" NÃO ENCONTRADA';
        return;
      }

      const ws = wb.Sheets[found];
      const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });

      console.log('[Kanban Usinagem] Aba:', found, '| Linhas:', raw.length);
      if (raw.length) console.log('[Kanban Usinagem] Colunas detectadas:', Object.keys(raw[0]));

      const items = raw.map(row => {
        const mapped = {};
        Object.keys(row).forEach(k => { mapped[normKey(k)] = row[k]; });
        return {
          cod:    String(mapped['CODIGO'] || mapped['COD'] || mapped['B1_COD'] || mapped['PRODUTO'] || '').trim(),
          desc:   String(mapped['DESCRICAO'] || mapped['DESC'] || mapped['B1_DESC'] || '').trim(),
          atual:  parseFloat(mapped['QUANTIDADE'] || mapped['QTD'] || mapped['B2_QATU'] || mapped['SALDO'] || 0) || 0,
          qtdOps: parseInt(mapped['QTD_OPS_ABERTO'] || mapped['QTD_OP'] || 0) || 0,
          ops:    String(mapped['OPS_EM_ABERTO'] || mapped['OPS'] || mapped['OP'] || '').trim(),
        };
      }).filter(i => i.cod);

      if (!items.length && raw.length) {
        const cols = raw.length ? Object.keys(raw[0]).join(', ') : '—';
        document.getElementById('bar-list').innerHTML = `
          <div style="padding:32px 0;text-align:center;">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--yellow);margin-bottom:10px;">COLUNAS NÃO RECONHECIDAS</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);line-height:1.8;">
              Aba <span style="color:var(--cyan)">"Estoque"</span> encontrada com <strong style="color:var(--text)">${raw.length}</strong> linhas, mas nenhum item reconhecido.<br><br>
              <span style="color:var(--muted)">Colunas detectadas:</span><br>
              <span style="color:var(--text)">${cols}</span>
            </div>
          </div>`;
        document.getElementById('panel-subtitle').textContent = 'COLUNAS NÃO RECONHECIDAS';
        return;
      }

      renderKanban(items);
    }

    // ── INIT — lê arquivo do sessionStorage compartilhado ────────────
    (function init() {
      const b64 = sessionStorage.getItem('dash_wb_binary');
      if (!b64) { window.location.replace('upload.html'); return; }
      try {
        processarXlsx(decodeURIComponent(escape(atob(b64))));
      } catch (e) {
        console.error('[Kanban] Falha ao carregar:', e);
        window.location.replace('upload.html');
      }
    })();

    // ── RENDER ───────────────────────────────────────────────────────
    function renderKanban(items) {
      items.sort((a, b) => b.atual - a.atual);

      const maxVal = Math.max(...items.map(i => {
        const cfg = getCfg(i.cod);
        return Math.max(i.atual, cfg.limite);
      }));
      const scale = (maxVal || 1) * 1.1;

      const list = document.getElementById('bar-list');
      list.innerHTML = '';

      let cntBaixo = 0, cntNormal = 0, cntExcedido = 0;

      items.forEach((item, idx) => {
        const cfg = getCfg(item.cod);
        const status = getStatus(item.atual, cfg);

        if (status.label === 'BAIXO') cntBaixo++;
        else if (status.label === 'NORMAL') cntNormal++;
        else cntExcedido++;

        const pctFill = Math.min((item.atual / scale) * 100, 100);
        const pctMin = Math.min((cfg.minimo / scale) * 100, 100);
        const pctLim = Math.min((cfg.limite / scale) * 100, 100);

        if (idx > 0) {
          const div = document.createElement('div');
          div.className = 'bar-divider';
          list.appendChild(div);
        }

        const row = document.createElement('div');
        row.className = 'bar-row';
        const svgLink = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>`;
        const opsUrl = `https://intranet.consilos.com.br/producao/ordens-producao/t/2/t/1,2,3/t/t/t/t/t/t/t/t/t/t/t/t/t/2/t/t/2/t/t/t/t/t/t/t/2/t/t/t/t/t/t/t/t/t/t/1/n/1/2/2/t/0,1,2,E,3,4,5,6,7,9/1/2/${encodeURIComponent(item.ops)}/`;
        const itemUrl = `https://intranet.consilos.com.br/simulacao-estoque/index/${encodeURIComponent(item.cod)}`;

        row.innerHTML = `
          <!-- col 1: produto -->
          <div class="bar-info">
            <span class="bar-code">${esc(item.cod)}</span>
            <span class="bar-desc" title="${esc(item.desc)}">${esc(item.desc) || '—'}</span>
          </div>
          <!-- col 2: gráfico -->
          <div class="track-wrap" data-idx="${idx}">
            <div class="track-bg">
              <div class="track-fill" data-pct="${pctFill}" style="background:${status.color}"></div>
            </div>
            <div class="track-marker min" style="left:${pctMin}%"></div>
            <div class="track-marker lim" style="left:${pctLim}%"></div>
          </div>
          <!-- col 3: saldo -->
          <div class="bar-val" style="color:${status.color}">${item.atual}</div>
          <!-- col 4: qtd op -->
          <div class="bar-ops-col">
            ${item.qtdOps > 0
              ? `<span class="bar-ops-num">${item.qtdOps}</span>`
              : `<span class="bar-ops-empty">—</span>`}
          </div>
          <!-- col 5: link produto -->
          <div class="bar-links-col">
            <a class="bar-link" href="${itemUrl}" target="_blank" title="Estoque do produto">
              ${svgLink}
            </a>
          </div>
          <!-- col 6: link ops -->
          <div class="bar-links-col">
            ${item.ops ? `<a class="bar-link-ops" href="${opsUrl}" target="_blank" title="OPs em aberto">${svgLink}</a>` : ''}
          </div>
        `;

        const trackWrap = row.querySelector('.track-wrap');
        trackWrap.addEventListener('mouseenter', e => showTooltip(e, item, cfg, status));
        trackWrap.addEventListener('mousemove', e => moveTooltip(e));
        trackWrap.addEventListener('mouseleave', hideTooltip);

        list.appendChild(row);
      });

      document.getElementById('panel-subtitle').textContent =
        `CONTROLE DE ESTOQUE — ${items.length} ${items.length === 1 ? 'item' : 'itens'}`;
      document.getElementById('cnt-baixo').textContent = cntBaixo;
      document.getElementById('cnt-normal').textContent = cntNormal;
      document.getElementById('cnt-excedido').textContent = cntExcedido;

      document.getElementById('kanban-panel').style.display = 'block';

      notificarEstoque(items);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.querySelectorAll('.track-fill').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }));
    }

    // ── TOOLTIP ─────────────────────────────────────────────────────
    const tooltip = document.getElementById('tooltip');

    function showTooltip(e, item, cfg, status) {
      document.getElementById('tt-badge').textContent = status.label;
      document.getElementById('tt-badge').style.background =
        status.label === 'BAIXO' ? 'rgba(245,200,66,0.15)' :
          status.label === 'EXCEDIDO' ? 'rgba(255,77,109,0.15)' : 'rgba(0,212,162,0.15)';
      document.getElementById('tt-badge').style.color = status.color;
      document.getElementById('tt-badge').style.border = `1px solid ${status.color}`;

      document.getElementById('tt-code').textContent = item.cod;
      document.getElementById('tt-name').textContent = item.desc || '—';
      document.getElementById('tt-atual').textContent = item.atual;
      document.getElementById('tt-min').textContent = cfg.minimo;
      document.getElementById('tt-normal').textContent = `${cfg.minimo} – ${cfg.limite}`;
      document.getElementById('tt-limite').textContent = cfg.limite;

      const opsEl = document.getElementById('tt-ops');
      if (item.qtdOps > 0) {
        document.getElementById('tt-ops-val').textContent = `${item.qtdOps} OP${item.qtdOps > 1 ? 's' : ''}`;
        document.getElementById('tt-ops-link').href =
          `https://intranet.consilos.com.br/producao/ordens-producao/t/2/t/1,2,3/t/t/t/t/t/t/t/t/t/t/t/t/t/2/t/t/2/t/t/t/t/t/t/t/2/t/t/t/t/t/t/t/t/t/t/1/n/1/2/2/t/0,1,2,E,3,4,5,6,7,9/1/2/${encodeURIComponent(item.ops)}/`;
        opsEl.style.display = 'flex';
      } else {
        opsEl.style.display = 'none';
      }

      const noteEl = document.getElementById('tt-note');
      if (status.label === 'BAIXO') {
        noteEl.textContent = `Faltam ${cfg.minimo - item.atual} un para o mínimo`;
        noteEl.style.color = 'var(--yellow)';
        noteEl.style.display = 'block';
      } else if (status.label === 'EXCEDIDO') {
        noteEl.textContent = `Excede em ${item.atual - cfg.limite} un o limite`;
        noteEl.style.color = 'var(--red)';
        noteEl.style.display = 'block';
      } else {
        noteEl.style.display = 'none';
      }

      tooltip.classList.add('visible');
      moveTooltip(e);
    }

    function moveTooltip(e) {
      const pad = 14, tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
      let x = e.clientX + pad, y = e.clientY + pad;
      if (x + tw > window.innerWidth - 8) x = e.clientX - tw - pad;
      if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    function hideTooltip() { tooltip.classList.remove('visible'); }

    // ── PAINEL DE NOTIFICAÇÕES ───────────────────────────────────────
    let notifDelay = 0;

    function notificarEstoque(items) {
      const list = document.getElementById('notif-list');
      list.innerHTML = '';
      notifDelay = 0;

      const alertas = [];
      items.forEach(i => {
        const cfg = getCfg(i.cod);
        if (i.atual < cfg.minimo) alertas.push({ tipo: 'baixo', item: i, cfg });
        else if (i.atual > cfg.limite) alertas.push({ tipo: 'excedido', item: i, cfg });
      });

      if (!alertas.length) {
        document.getElementById('notif-panel').style.display = 'none';
        return;
      }

      document.getElementById('notif-panel').style.display = 'flex';
      document.getElementById('notif-count').textContent = alertas.length;

      alertas.forEach(({ tipo, item, cfg }) => {
        const card = document.createElement('div');
        card.className = `notif-card ${tipo}`;
        card.style.animationDelay = notifDelay + 'ms';
        notifDelay += 80;

        const detalhe = tipo === 'baixo'
          ? `Atual <strong>${item.atual}</strong> · Mínimo ${cfg.minimo} · Faltam <strong>${cfg.minimo - item.atual}</strong> un`
          : `Atual <strong>${item.atual}</strong> · Limite ${cfg.limite} · Excede <strong>${item.atual - cfg.limite}</strong> un`;

        card.innerHTML = `
          <div class="notif-top">
            <span class="notif-badge">${tipo === 'baixo' ? 'BAIXO' : 'EXCEDIDO'}</span>
            <span class="notif-cod">${esc(item.cod)}</span>
            <a class="notif-link" href="https://intranet.consilos.com.br/simulacao-estoque/index/${encodeURIComponent(item.cod)}" target="_blank" title="Abrir no sistema">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
              </svg>
            </a>
            <button class="notif-x" onclick="fecharCard(this)" title="Fechar">✕</button>
          </div>
          <div class="notif-desc" title="${esc(item.desc)}">${esc(item.desc) || '—'}</div>
          <div class="notif-detail">${detalhe}</div>
        `;
        list.appendChild(card);
      });
    }

    function fecharCard(btn) {
      const card = btn.closest('.notif-card');
      if (card.dataset.fechando) return;
      card.dataset.fechando = '1';
      card.classList.add('saindo');
      setTimeout(() => { card.remove(); atualizarContador(); }, 180);
    }

    function fecharTodas() {
      document.getElementById('notif-panel').style.display = 'none';
    }

    function atualizarContador() {
      const restantes = document.querySelectorAll('.notif-card').length;
      if (restantes === 0) {
        document.getElementById('notif-panel').style.display = 'none';
      } else {
        document.getElementById('notif-count').textContent = restantes;
      }
    }

    // ── TEMA ─────────────────────────────────────────────────────────
    function aplicarIconesTema(isLight) {
      const lblEl = document.getElementById('tema-label');
      const darkEl = document.getElementById('tema-icon-dark');
      const lightEl = document.getElementById('tema-icon-light');
      if (lblEl) lblEl.textContent = isLight ? 'Escuro' : 'Claro';
      if (darkEl) darkEl.style.display = isLight ? 'block' : 'none';
      if (lightEl) lightEl.style.display = isLight ? 'none' : 'block';
    }

    function toggleTema() {
      const isLight = document.documentElement.getAttribute('data-theme') !== 'light';
      document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
      sessionStorage.setItem('dash_theme', isLight ? 'light' : 'dark');
      aplicarIconesTema(isLight);
    }

    // sincroniza ícones com tema já aplicado no <head>
    aplicarIconesTema(document.documentElement.getAttribute('data-theme') === 'light');
  </script>
</body>

</html>
